[package]
name = "vantadb_py"
version.workspace = true
edition.workspace = true
description = "VantaDB Python SDK: source-installed embedded persistent memory bindings"
license = "Apache-2.0"

[lib]
name = "vantadb_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.29", features = ["extension-module", "abi3-py311", "chrono"] }
serde_json = "1.0"
rayon = "1.12"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"

# In-process reference to the core engine (zero network overhead)
vantadb = { path = "../", default-features = false, features = ["fjall", "memmap2"] }
