name: Bug Report
description: Create a report to help us improve VantaDB.
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value:
        "Thanks for reporting a bug. Before you submit, search existing issues and remove any
        private data, local database contents, or secrets from logs."

  - type: input
    id: version
    attributes:
      label: VantaDB Version
      description: "What release, tag, commit SHA, or local branch are you using?"
      placeholder: "e.g. v0.1.0, main@abc1234, local checkout"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: "Which surface is failing?"
      options:
        - Rust SDK / embedded engine
        - Python SDK
        - CLI
        - Local server
        - Storage / durability / recovery
        - Vector search / HNSW
        - Text or hybrid search
        - CI / packaging
        - Documentation
        - Unsure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: "On what OS did you encounter this bug?"
      options:
        - Windows
        - macOS
        - Linux
        - Docker
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: "A clear and concise description of what the bug is."
      placeholder: "When I call search_memory with metadata filter X, I get Y instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "How can we reproduce the problem from a clean checkout or a minimal database?"
      value: |
        1. Create/open database at `./tmp-vantadb-repro`
        2. Insert records or run command/API call:
        3. Run search/read/rebuild/export/import:
        4. Observe:
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What should have happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Panic Trace
      description:
        "If the engine crashed, paste the panic output, `RUST_BACKTRACE=1` logs, or relevant Python
        traceback. Remove private data first."
      render: shell
