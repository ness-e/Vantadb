name: Feature Request
description: Suggest a focused enhancement for VantaDB.
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value:
        "Thanks for suggesting an improvement. Keep the request aligned with VantaDB's current
        local-first, embedded memory and retrieval boundary."

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: "Which part of VantaDB would this improve?"
      options:
        - Rust SDK / embedded engine
        - Python SDK
        - CLI
        - Local server
        - Storage / durability / recovery
        - Vector search / HNSW
        - Text or hybrid search
        - CI / packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem? Please describe."
      description: "Describe the current limitation or workflow problem."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description:
        "Describe the API, CLI, SDK, retrieval behavior, or documentation outcome you want."
      placeholder: |
        Example:
        db.search_memory("agent/main", query_vector, top_k=10, metadata={"type": "note"})
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description:
        "A clear and concise description of any alternative solutions or workarounds you've
        considered."

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description:
        "Add any other context, technical links, or screenshots about the feature request here."
