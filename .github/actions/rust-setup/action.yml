name: 'Rust & system setup'
description: 'Common Rust toolchain, cache, and system dependencies for VantaDB CI'
inputs:
  toolchain:
    description: 'Rust toolchain channel'
    required: false
    default: 'stable'
  components:
    description: 'Additional Rustup components (comma-separated)'
    required: false
    default: ''
  swap-mb:
    description: 'Swap file size in MB (0 to skip)'
    required: false
    default: '0'
  free-disk:
    description: 'Free disk space'
    required: false
    default: 'false'
  cache-bin:
    description: 'Whether to cache cargo binaries'
    required: false
    default: 'false'
  install-nextest:
    description: 'Install cargo-nextest'
    required: false
    default: 'false'
  install-llvm-cov:
    description: 'Install cargo-llvm-cov'
    required: false
    default: 'false'
  install-system-deps:
    description: 'Install system libraries (RocksDB, Clang)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Free Disk Space
      if: ${{ inputs.free-disk == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL

    - name: Add swap space
      if: ${{ inputs.swap-mb != '0' && runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo swapoff /swapfile || true
        sudo rm -f /swapfile
        sudo dd if=/dev/zero of=/swapfile bs=1M count=${{ inputs.swap-mb }}
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Rust cache
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      with:
        cache-bin: ${{ inputs.cache-bin }}

    - name: Install system dependencies
      if: ${{ inputs.install-system-deps == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libclang-dev clang librocksdb-dev

    - name: Install cargo-nextest
      if: ${{ inputs.install-nextest == 'true' }}
      uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb
      with:
        tool: nextest

    - name: Install cargo-llvm-cov
      if: ${{ inputs.install-llvm-cov == 'true' }}
      uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb
      with:
        tool: cargo-llvm-cov
