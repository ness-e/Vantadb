name: Python Wheels

on:
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: "Upload built wheels to TestPyPI"
        required: false
        default: "false"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "vantadb-python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python_wheels.yml"
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths:
      - "src/**"
      - "vantadb-python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python_wheels.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wheels:
    name: Build Python wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Run sccache-cache
        uses: mozilla/sccache-action@v0.0.7

      - name: Install Ubuntu system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Install Python build tools
        run: python -m pip install --upgrade pip maturin pytest

      - name: Validate version coherence
        run: cargo test --test version_coherence --all-features

      - name: Build wheel
        run: >
          python -m maturin build --manifest-path ./vantadb-python/Cargo.toml --out ./target/wheels
          --release

      - name: Install wheel smoke test (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          wheel="$(ls -t ./target/wheels/vantadb_py-*.whl | head -n 1)"
          python -m pip install --force-reinstall "$wheel"

      - name: Install wheel smoke test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem .\target\wheels\vantadb_py-*.whl | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          python -m pip install --force-reinstall $wheel

      - name: Python SDK smoke tests
        run: python -m pytest vantadb-python/tests/test_sdk.py -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./target/wheels/*.whl
          if-no-files-found: error

  publish-testpypi:
    name: Publish wheels to TestPyPI
    runs-on: ubuntu-latest
    needs: build-wheels
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_testpypi == 'true')
    environment: testpypi
    permissions:
      id-token: write  # OIDC Trusted Publishing

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: ./dist
          merge-multiple: true

      - name: List downloaded wheels
        run: ls -lh ./dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          skip-existing: true

  publish-pypi:
    name: Publish wheels to PyPI (Production)
    runs-on: ubuntu-latest
    needs: build-wheels
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # OIDC Trusted Publishing
      contents: write  # For GitHub Release assets
      attestations: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: ./dist
          merge-multiple: true

      - name: List downloaded wheels
        run: ls -lh ./dist

      - name: Attest Build Provenance for Wheels
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: './dist/*.whl'

      - name: Attach signed wheel artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*.whl

      - name: Prepare pure wheels for PyPI
        run: |
          mkdir pypi_dist
          cp ./dist/*.whl ./pypi_dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi_dist/
          verbose: true
