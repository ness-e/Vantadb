name: Python Wheels

on:
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: "Upload built wheels to TestPyPI"
        required: false
        default: "false"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "vantadb-python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python_wheels.yml"
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths:
      - "src/**"
      - "vantadb-python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python_wheels.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wheels:
    name: Build Python wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install Ubuntu system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Install Python build tools
        run: python -m pip install --upgrade pip maturin pytest

      - name: Validate version coherence
        run: cargo test --test version_coherence --all-features

      - name: Build wheel
        run: >
          python -m maturin build --manifest-path ./vantadb-python/Cargo.toml --out ./target/wheels
          --release

      - name: Install wheel smoke test (Unix)
        if: matrix.os != 'windows-2025-vs2026'
        shell: bash
        run: |
          wheel="$(ls -t ./target/wheels/vantadb_py-*.whl | head -n 1)"
          python -m pip install --force-reinstall "$wheel"

      - name: Install wheel smoke test (Windows)
        if: matrix.os == 'windows-2025-vs2026'
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem .\target\wheels\vantadb_py-*.whl | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          python -m pip install --force-reinstall $wheel

      - name: Python SDK smoke tests
        run: python -m pytest vantadb-python/tests/test_sdk.py -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./target/wheels/*.whl
          if-no-files-found: error

  publish-testpypi:
    name: Publish wheels to TestPyPI
    runs-on: ubuntu-latest
    needs: build-wheels
    if: github.event_name == 'workflow_dispatch' && inputs.publish_testpypi == 'true'
    permissions:
      contents: read

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: ./target/wheels
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Upload to TestPyPI
        env:
          MATURIN_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          test -n "$MATURIN_PASSWORD"
          python -m maturin upload --repository testpypi --username __token__ ./target/wheels/*.whl

  publish-pypi:
    name: Publish wheels to PyPI (Production)
    runs-on: ubuntu-latest
    needs: build-wheels
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # Required for OIDC trusted publishing & Sigstore
      contents: write  # Required for release assets if needed
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: ./target/wheels
          merge-multiple: true

      - name: Sign wheels with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            ./target/wheels/*.whl

      - name: Attach signed wheel artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./target/wheels/*.whl
            ./target/wheels/*.sig
            ./target/wheels/*.crt

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
