name: 'RELEASE: Adapters — PyPI Publish'

on:
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: "Upload to TestPyPI"
        required: false
        default: "false"
  push:
    tags: ["adapters-v*.*.*"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test-adapters:
    name: Test adapters (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        adapter: [langchain, llamaindex, mem0, crewai, dspy, haystack, letta, openai, ollama]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install adapter + test deps
        run: |
          python -m pip install --upgrade pip hatchling
          pip install -e vantadb-python
          cd integrations/${{ matrix.adapter }}
          pip install -e .
          pip install pytest

      - name: Run adapter tests
        run: |
          cd integrations/${{ matrix.adapter }}
          python -m pytest tests/ -v

  publish-adapter:
    name: Publish adapter wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-adapters

    strategy:
      fail-fast: false
      matrix:
        adapter: [langchain, llamaindex, mem0, crewai, dspy, haystack, letta, openai, ollama]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build hatchling

      - name: Build adapter
        working-directory: integrations/${{ matrix.adapter }}
        run: python -m build

      - name: Store built packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-${{ matrix.adapter }}
          path: integrations/${{ matrix.adapter }}/dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: publish-adapter
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' && inputs.publish_testpypi == 'true'
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download all dists
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: dist-*
          path: ./dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/simple/
          verbose: true
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI (Production)
    runs-on: ubuntu-latest
    needs: publish-adapter
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/adapters-v')
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download all dists
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: dist-*
          path: ./dist
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e
        with:
          subject-path: './dist/*'

      - name: Attach to Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          files: ./dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
