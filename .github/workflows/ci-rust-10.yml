name: 'CI: Rust — Build & Lint + Tests'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.config/nextest.toml'
      - '.github/workflows/ci-rust-10.yml'
      - 'deny.toml'
      - 'rust-toolchain.toml'
      - 'vantadb-*/**'
      - 'integrations/**'
      - '!web/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.config/nextest.toml'
      - '.github/workflows/ci-rust-10.yml'
      - 'deny.toml'
      - 'rust-toolchain.toml'
      - 'vantadb-*/**'
      - 'integrations/**'
      - '!web/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          components: rustfmt
          swap-mb: 0
          install-system-deps: false

      - name: Format Check
        run: cargo fmt --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          install-nextest: false
          install-system-deps: true
          swap-mb: 4096

      - name: Clippy Lints
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          install-nextest: true
          install-system-deps: true
          swap-mb: 6144

      - name: Cache benchmark dataset (GloVe 100d)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: data/benchmark/glove.6B.100d.txt
          key: glove-100d-v1

      - name: Download benchmark datasets
        run: bash scripts/download_benchmark_datasets.sh
        shell: bash

      - name: Run tests (Audit profile)
        timeout-minutes: 25
        run: cargo nextest run --profile audit --workspace --features "cli,arrow,tls,opentelemetry"

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust (Windows)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc
        with:
          cache-bin: "false"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: nextest

      - name: Cargo check (Windows smoke test)
        run: cargo check --workspace

      - name: Clippy (Windows)
        run: cargo clippy --workspace -- -D warnings

      - name: Run quick integrity tests (Windows)
        shell: pwsh
        timeout-minutes: 25
        run: cargo nextest run --profile ci-windows --workspace --features "cli,arrow,tls,opentelemetry"

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc
        with:
          cache-bin: "false"

      - name: Install system dependencies
        run: |
          brew update
          brew install rocksdb llvm

      - name: Install cargo-nextest
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: nextest

      - name: Cargo check (macOS smoke test)
        run: cargo check --workspace

      - name: Clippy (macOS)
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests (Audit profile)
        shell: bash
        timeout-minutes: 25
        run: cargo nextest run --profile audit --workspace --features "cli,arrow,tls,opentelemetry"

  msrv:
    name: MSRV Check (1.94.1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: 1.94.1
          install-nextest: false
          install-llvm-cov: false

      - name: cargo check (MSRV)
        run: cargo check --workspace

  minimal-versions:
    name: Minimal Versions Check (-Zminimal-versions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          install-nextest: false
          install-llvm-cov: false

      - name: cargo check (minimal-versions)
        run: cargo +nightly check -Zminimal-versions --workspace

  coverage:
    name: Code Coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/rust-setup
        with:
          components: llvm-tools-preview
          install-nextest: true
          install-llvm-cov: true
          install-system-deps: true
          swap-mb: 6144

      - name: Cache benchmark dataset (GloVe 100d)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: data/benchmark/glove.6B.100d.txt
          key: glove-100d-v1

      - name: Download benchmark datasets
        run: bash scripts/download_benchmark_datasets.sh
        shell: bash

      - name: Run tests with coverage
        timeout-minutes: 25
        run: |
          cargo llvm-cov nextest \
            --profile audit \
            --workspace \
            --features "cli,arrow,tls,opentelemetry" \
            --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests/|benches/|packages/experimental|crash_injection)' \
            2>&1
          echo "--- Coverage Summary ---"
          cargo llvm-cov report \
            --ignore-filename-regex '(tests/|benches/|packages/experimental)'

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: warn

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/rust-setup
        with:
          install-nextest: false
          install-llvm-cov: false
          install-system-deps: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-audit

      - name: Security Audit
        run: cargo audit --ignore RUSTSEC-2026-0176 --ignore RUSTSEC-2026-0177

  miri:
    name: Miri (UB Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust (Nightly + Miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: miri

      - name: Rust Cache
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc
        with:
          shared-key: miri-cache

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Miri Setup (core)
        run: cargo miri setup --manifest-path Cargo.toml -p vantadb
        env:
          MIRI_NO_HOST_FALLBACK: 1

      - name: Miri Test (core — unsafe patterns)
        run: cargo miri test --manifest-path Cargo.toml -p vantadb -- miri
        env:
          MIRI_NO_HOST_FALLBACK: 1
          RUSTFLAGS: "-Zrandomize-layout"
        continue-on-error: true

  deny:
    name: Dependency Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: ./.github/actions/rust-setup
        with:
          install-nextest: false
          install-llvm-cov: false
          install-system-deps: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-deny

      - name: Dependency Policy Check
        run: cargo deny check

  sanitizer-asan:
    name: ASan (AddressSanitizer)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install nightly + ASan
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc
        with:
          shared-key: sanitizer-asan

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Test with AddressSanitizer
        run: cargo test --package vantadb --features "cli,arrow,tls,opentelemetry"
        env:
          RUSTFLAGS: "-Z sanitizer=address"
          RUSTDOCFLAGS: "-Z sanitizer=address"
          ASAN_OPTIONS: "detect_stack_use_after_return=1:detect_leaks=1:abort_on_error=1"
          LSAN_OPTIONS: "suppressions=.lsan_suppressions"

  sanitizer-tsan:
    name: TSan (ThreadSanitizer)
    needs: sanitizer-asan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install nightly + TSan
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc
        with:
          shared-key: sanitizer-tsan

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Test with ThreadSanitizer
        run: cargo test --package vantadb --features "cli,arrow,tls,opentelemetry"
        env:
          RUSTFLAGS: "-Z sanitizer=thread"
          RUSTDOCFLAGS: "-Z sanitizer=thread"
          TSAN_OPTIONS: "suppress_equal_stacks=1:halt_on_error=1:abort_on_error=1"
