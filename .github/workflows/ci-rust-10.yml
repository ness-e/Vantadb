name: 'CI: Rust — Build & Lint + Tests'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.config/nextest.toml'
      - '.github/workflows/ci-rust-10.yml'
      - 'deny.toml'
      - 'rust-toolchain.toml'
      - 'vantadb-*/**'
      - 'integrations/**'
      - '!web/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.config/nextest.toml'
      - '.github/workflows/ci-rust-10.yml'
      - 'deny.toml'
      - 'rust-toolchain.toml'
      - 'vantadb-*/**'
      - 'integrations/**'
      - '!web/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: fmt-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          components: rustfmt
          swap-mb: 0
          install-system-deps: false

      - name: Format Check
        run: cargo fmt --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          install-nextest: false
          install-system-deps: true
          swap-mb: 4096

      - name: Clippy Lints (core)
        run: cargo clippy --workspace --all-targets --all-features --exclude vantadb-wasm -- -D warnings

  test:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          install-nextest: true
          install-system-deps: true
          swap-mb: 8192

      - name: Cache benchmark dataset (GloVe 100d)
        id: cache-benchmark
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: data/benchmark/glove.6B.100d.txt
          key: glove-100d-${{ hashFiles('scripts/download_benchmark_datasets.sh') }}

      - name: Download benchmark datasets
        if: steps.cache-benchmark.outputs.cache-hit != 'true'
        run: bash scripts/download_benchmark_datasets.sh
        shell: bash

      - name: Run tests (Audit profile, core)
        timeout-minutes: 25
        run: cargo nextest run --profile audit --features "cli,arrow,tls,opentelemetry"

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (Windows)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          components: clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
        with:
          cache-bin: "false"

      - name: Install cargo-nextest
        shell: pwsh
        run: cargo install cargo-nextest --locked

      - name: Cargo check (Windows smoke test)
        run: cargo check

      - name: Clippy (Windows)
        run: cargo clippy --workspace --all-targets --all-features --exclude vantadb-wasm -- -D warnings

      - name: Run quick integrity tests (Windows)
        shell: pwsh
        timeout-minutes: 30
        run: cargo nextest run --profile ci-windows --features "cli,arrow,tls,opentelemetry"

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          install-nextest: true

      - name: Install system dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install rocksdb llvm
          echo "ROCKSDB_LIB_DIR=$(brew --prefix rocksdb)/lib" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Cargo check (macOS smoke test)
        run: cargo check

      - name: Clippy (macOS)
        run: cargo clippy --workspace --all-targets --all-features --exclude vantadb-wasm -- -D warnings

      - name: Run tests (Audit profile, core)
        shell: bash
        timeout-minutes: 25
        run: cargo nextest run --profile audit --features "cli,arrow,tls,opentelemetry"

  msrv:
    name: MSRV Check (1.94.1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: 1.94.1
          install-nextest: false
          install-llvm-cov: false

      - name: cargo check (MSRV, core)
        run: cargo check

  minimal-versions:
    name: Minimal Versions Check (-Zminimal-versions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          install-nextest: false
          install-llvm-cov: false

      - name: cargo check (minimal-versions, core)
        run: cargo +nightly check -Zminimal-versions

  coverage:
    name: Code Coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          components: llvm-tools-preview
          install-nextest: true
          install-llvm-cov: true
          install-system-deps: true
          swap-mb: 8192

      - name: Cache benchmark dataset (GloVe 100d)
        id: cache-benchmark
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: data/benchmark/glove.6B.100d.txt
          key: glove-100d-${{ hashFiles('scripts/download_benchmark_datasets.sh') }}

      - name: Download benchmark datasets
        if: steps.cache-benchmark.outputs.cache-hit != 'true'
        run: bash scripts/download_benchmark_datasets.sh
        shell: bash

      - name: Run tests with coverage
        timeout-minutes: 25
        run: |
          cargo llvm-cov nextest \
            --profile audit \
            --workspace \
            --features "cli,arrow,tls,opentelemetry" \
            --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests/|benches/|packages/experimental|crash_injection)' \
            2>&1
          echo "--- Coverage Summary ---"
          cargo llvm-cov report \
            --ignore-filename-regex '(tests/|benches/|packages/experimental)'

      - name: Enforce coverage threshold (>=59%)
        shell: bash
        run: |
          cargo llvm-cov report --json \
            --ignore-filename-regex '(tests/|benches/|packages/experimental)' \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          data = d.get('data', [])
          if not data:
            print('ERROR: llvm-cov JSON has no data array')
            sys.exit(1)
          totals = data[0].get('totals', {})
          lines = totals.get('lines', {})
          pct = lines.get('percent', 0.0)
          ok = pct >= 59.0
          print(f'Line coverage: {pct:.1f}% {\"✅\" if ok else \"❌\"}')
          sys.exit(0 if ok else 1)
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: warn

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          install-nextest: false
          install-llvm-cov: false
          install-system-deps: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with:
          tool: cargo-audit

      - name: Security Audit
        run: cargo audit --ignore RUSTSEC-2026-0176 --ignore RUSTSEC-2026-0177

  miri:
    name: Miri (UB Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (Nightly + Miri)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly
          components: miri

      - name: Rust Cache
        uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
        with:
          shared-key: miri-cache

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Miri Setup (core)
        run: cargo +nightly miri setup --manifest-path Cargo.toml -p vantadb
        env:
          MIRI_NO_HOST_FALLBACK: 1

      - name: Miri Test (core — unsafe patterns)
        run: cargo +nightly miri test --manifest-path Cargo.toml -p vantadb -- miri
        env:
          MIRI_NO_HOST_FALLBACK: 1
          RUSTFLAGS: "-Zrandomize-layout"

  deny:
    name: Dependency Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          install-nextest: false
          install-llvm-cov: false
          install-system-deps: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with:
          tool: cargo-deny

      - name: Dependency Policy Check
        run: cargo deny check

  sanitizer-asan:
    name: ASan (AddressSanitizer)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly
          components: rust-src

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Test with AddressSanitizer
        continue-on-error: true
        run: |
          cargo +nightly test \
            --target x86_64-unknown-linux-gnu \
            --package vantadb \
            --features "cli,arrow,tls,opentelemetry" \
            --config 'target.x86_64-unknown-linux-gnu.rustflags = ["-Zsanitizer=address", "-Cunsafe-allow-abi-mismatch=sanitizer"]' \
            || echo "ASan reported issues (see log above)"
        env:
          ASAN_OPTIONS: "detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=0"
          LSAN_OPTIONS: "suppressions=.lsan_suppressions"

  sanitizer-tsan:
    name: TSan (ThreadSanitizer)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Test with ThreadSanitizer
        continue-on-error: true
        run: |
          cargo +nightly test \
            --target x86_64-unknown-linux-gnu \
            --package vantadb \
            --features "cli,arrow,tls,opentelemetry" \
            --config 'target.x86_64-unknown-linux-gnu.rustflags = ["-Zsanitizer=thread", "-Cunsafe-allow-abi-mismatch=sanitizer"]' \
            -- \
            --skip sift1m_competitive_benchmark \
            --skip test_glove100_hnsw_basic \
            --skip test_triple_backend_parity_validation \
            --skip zero_dim_vector_search_empty \
            || echo "TSan reported issues (see log above)"
        env:
          TSAN_OPTIONS: "halt_on_error=0"
