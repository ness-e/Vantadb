name: 'FUZZ: LibFuzzer — Corpus + Regression'

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'Seconds per fuzz target'
        required: true
        default: '60'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build fuzz targets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: fuzz-build

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build all fuzz targets
        run: cargo fuzz build

  fuzz:
    name: Fuzz ${{ matrix.target }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_parser
          - fuzz_node_deserialize
          - fuzz_wal
          - fuzz_archive

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: fuzz-build

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run ${{ matrix.target }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=${{ inputs.max_seconds || '60' }}
