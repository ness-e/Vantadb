name: 'FUZZ: LibFuzzer — Corpus + Regression'

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'Seconds per fuzz target'
        required: true
        default: '60'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build fuzz targets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc
        with:
          shared-key: fuzz-build

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-fuzz

      - name: Build all fuzz targets
        run: cargo fuzz build

  fuzz:
    name: Fuzz ${{ matrix.target }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_parser
          - fuzz_node_deserialize
          - fuzz_wal
          - fuzz_archive

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc
        with:
          shared-key: fuzz-build

      - name: Restore fuzz corpus cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.ref_name }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145
        with:
          tool: cargo-fuzz

      - name: Run ${{ matrix.target }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=${{ inputs.max_seconds || '60' }}
