name: 'FUZZ: LibFuzzer — Corpus + Regression'

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'Seconds per fuzz target'
        required: true
        default: '60'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build fuzz targets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
        with:
          shared-key: fuzz-build

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with:
          tool: cargo-fuzz

      - name: Build all fuzz targets
        run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu

  fuzz:
    name: Fuzz ${{ matrix.target }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_parser
          - fuzz_node_deserialize
          - fuzz_wal
          - fuzz_archive

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
        with:
          shared-key: fuzz-build

      - name: Restore fuzz corpus cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.ref_name }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Clean stale crash artifacts
        run: rm -rf fuzz/artifacts/${{ matrix.target }}/

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with:
          tool: cargo-fuzz

      - name: Run ${{ matrix.target }}
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} -- -max_total_time=${{ inputs.max_seconds || '60' }} -max_len=8192
