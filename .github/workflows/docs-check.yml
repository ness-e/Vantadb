name: Docs Check

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  pull_request:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
      - name: Lint Markdown
        run: npx markdownlint-cli2 "docs/**/*.md"

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
      - name: Check links
        continue-on-error: true
        run: npx lychee "docs/**/*.md" || echo "Link check skipped (tool not available)"

  check-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
      - name: Check frontmatter required fields
        run: |
          PASS=true
          for f in $(find docs -name "*.md"); do
            if head -1 "$f" | grep -q "^---$"; then
              title=$(sed -n '/^---$/,/^---$/p' "$f" | grep -i "^title:" | head -1)
              if [ -z "$title" ]; then
                echo "::error file=$f::Missing frontmatter field: title"
                PASS=false
              fi
            fi
          done
          if [ "$PASS" != "true" ]; then exit 1; fi
          echo "All documents have valid frontmatter."