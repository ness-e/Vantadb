name: 'GATE: Docs — Lint & Frontmatter'

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  pull_request:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Lint Markdown
        run: npx markdownlint-cli2 "docs/**/*.md"

  check-format:
    name: Check Frontmatter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check frontmatter required fields
        run: |
          PASS=true
          for f in $(find docs -name "*.md"); do
            if head -1 "$f" | grep -q "^---$"; then
              title=$(sed -n '/^---$/,/^---$/p' "$f" | grep -i "^title:" | head -1)
              if [ -z "$title" ]; then
                echo "::error file=$f::Missing frontmatter field: title"
                PASS=false
              fi
            fi
          done
          if [ "$PASS" != "true" ]; then exit 1; fi
          echo "All documents have valid frontmatter."
