name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        type: choice
        options: [wasm, ts, both]
        required: true
        default: "both"
      dry_run:
        description: "Dry run (no actual publish)"
        required: false
        default: "false"
  push:
    tags: ["wasm-v*.*.*", "ts-v*.*.*"]

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-wasm:
    name: Publish vantadb-wasm to npm
    if: >
      startsWith(github.ref, 'refs/tags/wasm-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.package != 'ts')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa
        with:
          version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM package
        run: wasm-pack build --release
        working-directory: vantadb-wasm

      - name: Publish to npm
        working-directory: vantadb-wasm/pkg
        run: >
          npm publish $(if [ '${{ inputs.dry_run || '' }}' = 'true' ]; then echo '--dry-run'; fi)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ts:
    name: Publish vantadb (TS) to npm
    if: >
      startsWith(github.ref, 'refs/tags/ts-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.package != 'wasm')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa
        with:
          version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM package (needed for local dep)
        run: wasm-pack build --release
        working-directory: vantadb-wasm

      - name: Install dependencies
        working-directory: vantadb-ts
        run: npm install

      - name: Build TypeScript
        working-directory: vantadb-ts
        run: npm run build

      - name: Rewrite dependency for publish
        working-directory: vantadb-ts
        run: |
          WASM_VER=$(grep '^version' vantadb-wasm/Cargo.toml | head -1 | sed 's/.*= *"//' | sed 's/".*//')
          npm pkg set "dependencies.vantadb-wasm=^${WASM_VER}"

      - name: Publish to npm
        working-directory: vantadb-ts
        run: >
          npm publish $(if [ '${{ inputs.dry_run || '' }}' = 'true' ]; then echo '--dry-run'; fi)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}