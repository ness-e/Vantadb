name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          target: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }} --package vantadb --bin vanta-cli
          cargo build --release --target ${{ matrix.target }} --package vantadb-server
          cargo build --release --target ${{ matrix.target }} --package vantadb-mcp

      - name: Package binaries
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/vanta-cli release/
          cp target/${{ matrix.target }}/release/vantadb-server release/
          cp target/${{ matrix.target }}/release/vantadb-mcp release/
          tar czf vantadb-${{ matrix.target }}.tar.gz -C release vanta-cli vantadb-server vantadb-mcp

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "vantadb-${{ matrix.target }}.tar.gz" \
            --repo "${{ github.repository }}" \
            --clobber