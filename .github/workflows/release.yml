name: Release ConnectomeDB

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build release binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: connectomedb
            asset_name: connectomedb-linux-amd64
          - os: macos-latest
            artifact_name: connectomedb
            asset_name: connectomedb-macos-amd64
          - os: windows-latest
            artifact_name: connectomedb.exe
            asset_name: connectomedb-windows-amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Release Binary
        run: cargo build --release

      - name: Rename Binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/release/connectomedb target/release/${{ matrix.asset_name }}

      - name: Rename Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: move target\release\connectomedb.exe target\release\${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/release/${{ matrix.asset_name }}
          draft: true
          generate_release_notes: true
