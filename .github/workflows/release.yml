name: Release VantaDB

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    name: Build release binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: vanta-server
            asset_name: vanta-server-linux-amd64
          - os: macos-latest
            artifact_name: vanta-server
            asset_name: vanta-server-macos-amd64
          - os: windows-latest
            artifact_name: vanta-server.exe
            asset_name: vanta-server-windows-amd64.exe

    steps:
      - name: Free Disk Space (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Release Binary
        run: cargo build --release

      - name: Rename Binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}

      - name: Rename Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Rename-Item -Path "target\release\${{ matrix.artifact_name }}" -NewName "${{ matrix.asset_name }}"

      - name: Generate Checksums
        shell: bash
        run: |
          cd target/release
          if [ "$RUNNER_OS" == "Windows" ]; then
            certutil -hashfile ${{ matrix.asset_name }} SHA256 | grep -v "hashfile" | grep -v "CertUtil" | tr -d '\r\n' > ${{ matrix.asset_name }}.sha256
          elif [ "$RUNNER_OS" == "macOS" ]; then
            shasum -a 256 ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          else
            sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/release/${{ matrix.asset_name }}
            target/release/${{ matrix.asset_name }}.sha256
          draft: true
          generate_release_notes: true
