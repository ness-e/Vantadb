name: 'HEAVY: Benchmarks — Nightly Regression'

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  light-benchmarks:
    name: Light benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          swap-mb: 6144
          free-disk: true

      - name: Run HNSW benchmarks
        run: cargo bench --bench hnsw_pure -- --nocapture 2>&1 | tee nightly_hnsw_results.txt

      - name: Run hybrid queries benchmarks
        run: cargo bench --bench hybrid_queries -- --nocapture 2>&1 | tee nightly_hybrid_results.txt

      - name: Run stress test benchmarks
        run: cargo bench --bench stress_test -- --nocapture 2>&1 | tee nightly_stress_results.txt

      - name: Run concurrent benchmarks
        run: cargo bench --bench bench_concurrent -- --nocapture 2>&1 | tee nightly_concurrent_results.txt

      - name: Upload light results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: light-bench-results
          path: |
            nightly_*_results.txt
            target/criterion/

  high-density:
    name: High density
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/rust-setup
        with:
          swap-mb: 6144
          free-disk: true

      - name: Run high density benchmarks
        run: cargo bench --bench high_density -- --nocapture 2>&1 | tee nightly_density_results.txt

      - name: Upload density results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: density-bench-results
          path: |
            nightly_density_results.txt
            target/criterion/

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    needs: [light-benchmarks, high-density]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang librocksdb-dev

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Download light results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: light-bench-results
          path: light/

      - name: Download density results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: density-bench-results
          path: density/

      - name: Merge criterion results
        run: |
          mkdir -p target/criterion
          if [ -d light/target/criterion ]; then
            cp -r light/target/criterion/* target/criterion/
          fi
          if [ -d density/target/criterion ]; then
            cp -r density/target/criterion/* target/criterion/
          fi
          cp light/nightly_*_results.txt . 2>/dev/null || true
          cp density/nightly_*_results.txt . 2>/dev/null || true

      - name: Extract criterion estimates
        id: extract
        run: |
          python scripts/bench_regression.py extract \
            --criterion-root target/criterion \
            --output benchmark_report_criterion.json

      - name: Compare against baseline
        id: compare
        continue-on-error: true
        run: |
          python scripts/bench_regression.py compare \
            benchmark_report_criterion.json \
            --format json \
            --output bench_comparison_result.json \
            --fail-on-regression
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Detect regressions
        id: check_regression
        run: |
          if [ -f bench_comparison_result.json ]; then
            HAS_REG=$(python -c "import json; print(json.load(open('bench_comparison_result.json'))['has_regression'])")
            echo "has_regression=$HAS_REG" >> "$GITHUB_OUTPUT"
            echo "Regression detected: $HAS_REG"
          else
            echo "has_regression=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create regression issue
        if: steps.check_regression.outputs.has_regression == 'True'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('bench_comparison_result.json', 'utf8'));
            const markdown = fs.readFileSync('nightly_hnsw_results.txt', 'utf8').slice(0, 500)
              + '\n...\n*(truncated — see workflow artifacts for full logs)*';

            let body = `## ⚠️ Benchmark Regression Detected

            **Commit:** \`${context.sha}\`
            **Workflow:** [${context.workflow}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            **Threshold:** ${report.threshold_pct}%

            ### Regressions

            | Benchmark | Before (ms) | After (ms) | Change | Severity |
            |---|---|---|---|---|
            `;

            for (const r of report.regressions) {
              const icon = r.severity === 'critical' ? '🔴' : '🟡';
              body += `| ${r.label} | ${r.prev_ms} | ${r.current_ms} | +${r.change_pct}% | ${icon} ${r.severity} |\n`;
            }

            body += `\n<details><summary>Raw benchmark logs (truncated)</summary>\n\n\`\`\`\n${markdown}\n\`\`\`\n</details>`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['benchmark', 'regression'],
            });

            const existing = issues.find(i =>
              i.title.startsWith('[Benchmark] Regression detected')
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `**Re-checked on ${new Date().toISOString()}** — regression still present.\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Benchmark] Regression detected — ${new Date().toISOString().slice(0, 10)}`,
                labels: ['benchmark', 'regression'],
                body: body,
              });
            }

      - name: Store benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nightly-benchmark-results
          path: |
            nightly_*_results.txt
            benchmark_report_criterion.json
            bench_comparison_result.json
          retention-days: 30
