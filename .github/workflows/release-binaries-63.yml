name: 'RELEASE: Binaries — Build & Upload'

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          target: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - name: Install cross-compilation deps (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }} --package vantadb --bin vanta-cli
          cargo build --release --target ${{ matrix.target }} --package vantadb-server
          cargo build --release --target ${{ matrix.target }} --package vantadb-mcp

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/vanta-cli release/
          cp target/${{ matrix.target }}/release/vantadb-server release/
          cp target/${{ matrix.target }}/release/vantadb-mcp release/
          tar czf vantadb-${{ matrix.target }}.tar.gz -C release vanta-cli vantadb-server vantadb-mcp

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/vanta-cli.exe release/
          cp target/${{ matrix.target }}/release/vantadb-server.exe release/
          cp target/${{ matrix.target }}/release/vantadb-mcp.exe release/
          7z a vantadb-${{ matrix.target }}.zip .\release\*

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ext=".tar.gz"; [[ "${{ matrix.target }}" == *windows* ]] && ext=".zip"
          gh release upload "${{ github.ref_name }}" \
            "vantadb-${{ matrix.target }}${ext}" \
            --repo "${{ github.repository }}" \
            --clobber
