[package]
name = "vantadb-server"
version = "0.1.3"
edition = "2021"
publish = false
description = "Optional local server wrapper and MCP interface for VantaDB"

[dependencies]
vantadb = { path = "..", features = ["cli", "experimental"] }
tokio = { version = "1", features = ["full", "rt-multi-thread"] }
axum = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"

[dev-dependencies]
tower = { version = "0.4", features = ["util"] }
futures = "0.3"
tempfile = "3"
sysinfo = "0.30"
chrono = "0.4"
console = "0.15"
indicatif = "0.17"

[features]
governance = ["vantadb/governance"]
custom-allocator = ["mimalloc"]
# Exposed solely for test harness compatibility with tests/common/mod.rs
cli = ["vantadb/cli"]

[dependencies.mimalloc]
version = "0.1"
optional = true
