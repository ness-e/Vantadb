[package]
name = "vantadb-server"
version = "0.1.1"
edition = "2021"
publish = false
description = "Optional local server wrapper and MCP interface for VantaDB"

[dependencies]
vantadb = { path = "..", features = ["cli"] }
tokio = { version = "1", features = ["full", "rt-multi-thread"] }
axum = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"

[dev-dependencies]
tower = { version = "0.4", features = ["util"] }
futures = "0.3"

[features]
governance = ["vantadb/governance"]
