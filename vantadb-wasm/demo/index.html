<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VantaDB AI Agent — Browser Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-glow: rgba(88, 166, 255, 0.15);
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
  }
  header .badge {
    font-size: 11px;
    background: var(--accent-glow);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 100px;
    border: 1px solid rgba(88, 166, 255, 0.25);
  }
  #status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 13px;
    color: var(--text-muted);
  }
  #status-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--yellow);
    transition: background 0.3s;
  }
  #status-indicator.ready { background: var(--green); }
  #status-indicator.error { background: var(--red); }
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-container:empty::after {
    content: "Type a message below to start the conversation. Your memories persist across sessions via OPFS.";
    display: block;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 60px 20px;
    line-height: 1.6;
  }
  .message {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.5;
    animation: fadeIn 0.25s ease;
  }
  .message.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .message.agent {
    align-self: flex-start;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .message.system {
    align-self: center;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    max-width: 100%;
  }
  .message .memories {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  .message .memories summary {
    cursor: pointer;
    color: var(--accent);
    font-weight: 500;
  }
  .message .memories ul {
    list-style: none;
    padding: 8px 0 0 12px;
  }
  .message .memories li {
    padding: 4px 0;
    border-left: 2px solid var(--border);
    padding-left: 10px;
    margin-bottom: 4px;
  }
  .message .memories li .score {
    color: var(--yellow);
    font-size: 11px;
  }
  .input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 44px;
    max-height: 120px;
  }
  .input-area textarea:focus {
    border-color: var(--accent);
  }
  .input-area textarea::placeholder {
    color: var(--text-muted);
  }
  .input-area button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .input-area button:hover { opacity: 0.9; }
  .input-area button:active { transform: scale(0.97); }
  .input-area button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }
  .input-area .loading-spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: auto 0;
  }
  .input-area.loading .loading-spinner { display: block; }
  .input-area.loading button { display: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) {
    .message { max-width: 90%; }
    .chat-container { padding: 16px; }
    .input-area { padding: 12px 16px; }
  }
</style>
</head>
<body>
<header>
  <h1>VantaDB AI Agent</h1>
  <span class="badge">WASM · OPFS</span>
  <div id="status-bar">
    <span id="status-indicator"></span>
    <span id="status-text">Initializing…</span>
  </div>
</header>
<div class="chat-container" id="chat" role="log" aria-live="polite"></div>
<div class="input-area" id="input-area">
  <textarea id="input" rows="1" placeholder="Type a message…" disabled></textarea>
  <button id="send-btn" disabled>Send</button>
  <div class="loading-spinner"></div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
