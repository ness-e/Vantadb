backends:
  deepseek:
    url: https://api.deepseek.com/anthropic
    model_map:
      opus: deepseek-v4-pro
      sonnet: deepseek-v4-pro
      haiku: deepseek-v4-flash
      subagent: deepseek-v4-flash

  openrouter:
    url: https://openrouter.ai/api
    model_map:
      opus: deepseek/deepseek-v4-pro
      sonnet: deepseek/deepseek-v4-pro
      haiku: deepseek/deepseek-v4-pro
      subagent: deepseek/deepseek-v4-pro

  fireworks:
    url: https://api.fireworks.ai/inference
    model_map:
      opus: accounts/fireworks/models/deepseek-v4-pro
      sonnet: accounts/fireworks/models/deepseek-v4-pro
      haiku: accounts/fireworks/models/deepseek-v4-pro
      subagent: accounts/fireworks/models/deepseek-v4-pro

  anthropic:
    url: https://api.anthropic.com/v1

conversation_strategies:
  clear_per_cycle:
    description: Purge history after every tool cycle. Prevents context overflow from failed attempts poisoning subsequent calls.
    when: Models ≤10B params. Small windows mean stale context degrades output fast.
    history_window: 3

  clear_per_phase:
    description: Purge between task phases but retain within a phase. Enough context for multi-step reasoning within a bounded unit.
    when: Models 10-30B params. Can handle intra-phase context but cross-phase history causes drift.
    history_window: 10

  keep_all:
    description: Retain full conversation. Benefits from seeing prior attempts across the entire session.
    when: Models 30B+ params. Large context windows absorb history without quality regression.
    history_window: 50

model_ladder:
  T1:
    description: Cheap, high-throughput. Subagent work, simple fixes, linting, validation.
    models:
      - deepseek-v4-flash
      - gemma3
      - gemma4-e2b
    escalate_to: T2
    escalate_after: 3
    escalate_reason: Failed 3 consecutive attempts within a phase.

  T2:
    description: Medium capacity. Complex bug fixes, multi-step features, code generation.
    models:
      - gemma4-31b
      - gpt-oss-20b
    escalate_to: T3
    escalate_after: 5
    escalate_reason: Task exceeds medium-model capability or stalls 5 iterations.

  T3:
    description: Frontier capacity. Architecture decisions, novel patterns, full-repo reasoning.
    models:
      - deepseek-v4-pro
      - llama3-70b
      - deepseek-r1
    escalate_to: null
    escalate_after: null
    escalate_reason: Top tier — no further escalation.
