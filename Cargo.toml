[[test]]
name = "mmap_index"
path = "tests/mmap_index.rs"

[[test]]
name = "immunology"
path = "tests/immunology.rs"

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3

[workspace]
members = [
    ".",
    "nexusdb-python"
]
