[package]
name = "iadbms"
version = "0.1.0"
edition = "2021"
description = "Multimodel Database for Local AI — Vector + Graph + Relational unified engine"
license = "Apache-2.0"
readme = "README.md"
keywords = ["database", "vector", "graph", "ai", "embedded"]
categories = ["database-implementations"]

[dependencies]
# ── Fase 1: Core ──
serde = { version = "1", features = ["derive"] }
bincode = "1.3"
thiserror = "1"
parking_lot = "0.12"

# ── Fase 2: Parser + Storage (activar en Fase 2) ──
nom = "7"
arrow = { version = "53", features = ["ipc"] }
rocksdb = "0.22"

# ── Fase 3: Async + Integrations + Server ──
tokio = { version = "1", features = ["full", "rt-multi-thread"] }
reqwest = { version = "0.12", features = ["json"] }
axum = "0.7"
serde_json = "1.0"
prometheus = "0.13"
pyo3 = { version = "0.20", features = ["extension-module"], optional = true }

[features]
python_sdk = ["pyo3"]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"
tower = { version = "0.4", features = ["util"] }
http = "1"

[[bench]]
name = "hybrid_queries"
harness = false

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
