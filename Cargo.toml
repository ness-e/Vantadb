[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3

# Fast dev profile: balance between compilation speed and runtime performance.
# opt-level=1 gives ~35% faster builds than 0 while keeping debug usable.
# debug=1 emits line tables only (no full debug var info).
[profile.dev]
opt-level = 1
debug = 0
strip = "none"

# CI profile: release-like but without LTO for faster CI builds.
[profile.ci]
inherits = "release"
lto = "off"
codegen-units = 16
opt-level = 2

[workspace]
members = [
    ".",
    "vantadb-python",
    "vantadb-server",
    "vantadb-mcp",
    "vantadb-wasm",
    "vantadb-mem0",
    "vantadb-letta",
    "vantadb-crewai",
    "vantadb-dspy",
    "vantadb-haystack",
    "vantadb-litellm",
    "vantadb-openai",
    "vantadb-ollama",
    "vantadb-enterprise",
]

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.94.1"
exclude = ["fuzz"]
# fuzz/ is intentionally outside the workspace: cargo-fuzz requires nightly + Linux sanitizers.
# Run with: cargo +nightly fuzz run <target>  (in the fuzz/ directory on Linux)

[profile.test]
debug = 1
opt-level = 0

[profile.release.package.vantadb-wasm]
opt-level = "s"
strip = true
codegen-units = 1
