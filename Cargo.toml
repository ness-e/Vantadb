[package]
name = "vantadb"
version = "0.2.0"
edition = "2021"
rust-version = "1.94.1"
description = "VantaDB: An embedded persistent memory and vector retrieval engine for local-first AI applications."
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/ness-e/Vantadb"
homepage = "https://vantadb.dev"
documentation = "https://docs.rs/vantadb"
keywords = ["database", "vector", "graph", "embedded", "rust"]
categories = ["database-implementations"]
exclude = ["test/"]
[badges]
maintenance = { status = "actively-developed" }

[dependencies]
# ── Core ──
serde = { version = "1", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
postcard = { version = "1.1", features = ["alloc"] }
thiserror = "2"
parking_lot = "0.12"
lru = "0.12"
dashmap = "6"
arc-swap = "1.7"
zerocopy = { version = "0.8", features = ["derive"] }
smallvec = "1.15"

# ── Parser + Storage ──
rand = "0.9"
nom = "7"
subtle = "2.6"
arrow = { version = "58", features = ["ipc"], optional = true }
rocksdb = { version = "0.22", default-features = false, features = ["lz4"], optional = true }
fjall = { version = "3.1", optional = true }

# ── Async + Integrations + Server ──
crc32c = "0.5"
reqwest = { version = "0.12", features = ["json", "blocking"], optional = true }
serde_json = "1.0"
prometheus = { version = "0.14", optional = true }
pyo3 = { version = "0.29", features = ["extension-module", "chrono"], optional = true }
wide = ">=1.2, <2"
sysinfo = { version = "0.30", optional = true }
memmap2 = { version = "0.9", optional = true }
fs2 = { version = "0.4", optional = true }

# ── HTTP Server (optional, behind feature = "server") ──
tokio = { version = "1", features = ["rt", "rt-multi-thread", "net", "sync", "signal", "macros"], optional = true }
axum = { version = "0.8", optional = true }
tower_governor = { version = "0.8", optional = true }
tower-http = { version = "0.6.11", features = ["trace"], optional = true }
axum-server = { version = "0.7", optional = true, features = ["tls-rustls"] }
rustls = { version = "0.23", optional = true }
opentelemetry_sdk = { version = "0.32.1", optional = true }
opentelemetry-otlp = { version = "0.32.0", optional = true, features = ["grpc-tonic", "trace"] }

# ── Console UX ──
indicatif = { version = "0.18", optional = true }
console = { version = "0.16", optional = true }
clap = { version = "4.4", features = ["derive", "env"], optional = true }
clap_complete = { version = "4.4", optional = true }
rayon = { version = "1.12", optional = true }
tracing = "0.1"
notify = { version = "8", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
twox-hash = "2.1.2"
fail = { version = "0.5", optional = true, features = ["failpoints"] }
opentelemetry = { version = "0.32.0", optional = true }
tracing-opentelemetry = { version = "0.33.0", optional = true }
tantivy = { version = "0.22", optional = true, features = ["stopwords"] }
web-time = "1.1.0"
bloomfilter = { version = "3", optional = true }

# ── Encryption (optional, behind feature = "encryption") ──
aes-gcm = { version = "0.10", optional = true }
sha2 = { version = "0.10", optional = true }

[features]
default = ["cli", "arrow", "rocksdb", "fjall", "sysinfo", "memmap2", "fs2", "prometheus", "rayon", "advanced-tokenizer"]
async-ingestion = ["dep:tokio", "tokio/sync", "tokio/macros", "tokio/rt"]
async-io = ["dep:tokio", "tokio/fs", "tokio/io-util"]
arrow = ["dep:arrow"]
rocksdb = ["dep:rocksdb"]
fjall = ["dep:fjall"]
cli = ["dep:indicatif", "dep:console", "dep:clap", "dep:clap_complete"]
failpoints = ["dep:fail"]
remote-inference = ["dep:reqwest"]
python_sdk = ["pyo3"]
custom-allocator = ["mimalloc"]
jemalloc = ["dep:tikv-jemallocator", "dep:tikv-jemalloc-ctl", "tikv-jemalloc-ctl/stats"]
wasm = []
advanced-tokenizer = ["dep:tantivy"]
opentelemetry = [
    "dep:opentelemetry",
    "dep:tracing-opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "opentelemetry_sdk/rt-tokio",
]
governance = ["dep:bloomfilter"]
hot-reload = ["dep:notify"]
encryption = ["dep:aes-gcm", "dep:sha2"]
wal-shipping = ["dep:reqwest"]
pitr = []
server = [
    "cli",
    "dep:tokio",
    "dep:axum",
    "dep:tower_governor",
    "dep:tower-http",
]
tls = ["dep:axum-server", "dep:rustls"]

[dependencies.mimalloc]
version = "0.1"
optional = true

[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies.tikv-jemallocator]
version = "0.6"
optional = true

[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies.tikv-jemalloc-ctl]
version = "0.6"
optional = true

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = [
    "Win32_System_ProcessStatus",
    "Win32_System_Threading",
    "Win32_System_Memory",
    "Win32_Foundation",
] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
[target.'cfg(target_os = "macos")'.dependencies]
mach2 = "0.6"
[build-dependencies]
clap = { version = "4.4", features = ["derive", "env"], optional = true }
clap_complete = { version = "4.4", optional = true }

[dev-dependencies]
tokio = { version = "1", features = [
    "rt-multi-thread",
    "sync",
    "time",
    "fs",
    "macros",
    "io-util",
] }
criterion = { version = "0.8", features = ["html_reports", "async_tokio"] }
tempfile = "3"
proptest = "1.5"
http = "1"
futures = "0.3"
console = "0.16"
indicatif = "0.18"
serial_test = "3.2"

