[advisories]
ignore = [
    # RUSTSEC-2023-0089: atomic-polyfill is unmaintained.
    # Transitive via postcard -> heapless (0.7.x) -> atomic-polyfill.
    # Upstream: postcard 2.0 migrates to heapless 0.9+ which uses portable-atomic.
    # VantaDB already has portable-atomic as a direct dependency.
    "RUSTSEC-2023-0089",
    # RUSTSEC-2024-0436: paste is no longer maintained.
    # Transitive via tikv-jemalloc-ctl -> tikv-jemalloc-sys (cfg: linux/macos).
    # Moving to cargo audit CLI would break cross-platform verify.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2025-0134: rustls-pemfile is unmaintained.
    # Transitive via axum-server (feature: tls).
    # Moving to cargo audit CLI would break cross-platform verify.
    "RUSTSEC-2025-0134",
]

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause",
         "BSD-3-Clause", "ISC", "Zlib", "Unicode-3.0", "CC0-1.0",
         "BSL-1.0", "0BSD"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
