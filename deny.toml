[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "warn"
yanked = "deny"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD"
]

[bans]
multiple-versions = "allow"
