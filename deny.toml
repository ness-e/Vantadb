[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "transitive"
yanked = "deny"
ignore = [
    "RUSTSEC-2025-0119",
    "RUSTSEC-2026-0176"
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD"
]
