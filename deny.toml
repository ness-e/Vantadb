[advisories]
ignore = [
    # RUSTSEC-2023-0089: atomic-polyfill is unmaintained.
    # Transitive via postcard -> heapless (0.7.x) -> atomic-polyfill.
    # Upstream: postcard 2.0 migrates to heapless 0.9+ which uses portable-atomic.
    # VantaDB already has portable-atomic as a direct dependency.
    "RUSTSEC-2023-0089",

    # RUSTSEC-2024-0436: paste is unmaintained.
    # Transitive via tikv-jemalloc-ctl -> paste (build-time proc macro, no runtime risk).
    # Upstream: tikv-jemalloc-ctl 0.7 still depends on paste. No replacement needed.
    "RUSTSEC-2024-0436",

]

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause",
         "BSD-3-Clause", "ISC", "Zlib", "Unicode-3.0", "CC0-1.0",
         "BSL-1.0", "0BSD"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
