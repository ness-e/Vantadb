[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "transitive"
yanked = "deny"
ignore = [
    "RUSTSEC-2024-0384", # instant is unmaintained
    "RUSTSEC-2026-0002", # Transitive via tantivy 0.22; lru's IterMut unsoundness is low-risk
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD"
]

[bans]
multiple-versions = "allow"
