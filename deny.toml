[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "deny"
yanked = "deny"
ignore = [
    "RUSTSEC-2024-0384",
    "RUSTSEC-2026-0002",
]

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC",
         "Zlib", "Unicode-3.0", "CC0-1.0", "BSL-1.0", "0BSD"]
deny = ["AGPL-3.0", "GPL-3.0", "GPL-2.0", "Unlicense"]
unused = "deny"

[bans]
multiple-versions = "deny"
skip = []
skip-tree = []

[sources]
allow-git = []
unknown-registry = "deny"
unknown-git = "deny"
