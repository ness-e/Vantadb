[advisories]
ignore = [
    # RUSTSEC-2024-0384: chrono: time 0.1 vulnerability in chrono 0.4.x (optional dep).
    # Upstream fix requires chrono to bump time to 0.3+. Pinned pending chrono release.
    "RUSTSEC-2024-0384",
    # RUSTSEC-2023-0089: atomic-polyfill is unmaintained.
    # Transitive via postcard -> heapless (0.7.x) -> atomic-polyfill.
    # Upstream: postcard 2.0 migrates to heapless 0.9+ which uses portable-atomic.
    # VantaDB already has portable-atomic as a direct dependency.
    "RUSTSEC-2023-0089",
    # RUSTSEC-2026-0002: lru IterMut soundness issue (Stacked Borrows).
    # Transitive via tantivy 0.22.x which pins lru <0.16.
    # Not exploitable in normal usage; only relevant for Miri/UB validation.
    # Fix pending tantivy semver-major bump.
    "RUSTSEC-2026-0002",
    # RUSTSEC-2024-0436: paste is no longer maintained.
    # Transitive via tikv-jemalloc-ctl -> tikv-jemalloc-sys. No direct dep.
    # Upstream jemallocator has not migrated away from paste.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2025-0134: rustls-pemfile is unmaintained.
    # Transitive via axum-server. Upstream archived the repo.
    # Recommended migration: use rustls-pki-types directly.
    # axum-server has not updated yet.
    "RUSTSEC-2025-0134",
]

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause",
         "BSD-3-Clause", "ISC", "Zlib", "Unicode-3.0", "CC0-1.0",
         "BSL-1.0", "0BSD", "CDLA-Permissive-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
