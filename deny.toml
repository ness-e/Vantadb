[advisories]
ignore = [
    # RUSTSEC-2024-0384: chrono: time 0.1 vulnerability in chrono 0.4.x (optional dep).
    # Upstream fix requires chrono to bump time to 0.3+. Pinned pending chrono release.
    "RUSTSEC-2024-0384",
    # RUSTSEC-2023-0089: crossbeam-channel: race condition in select!.
    # Only affects crossbeam 0.7, transitive via rayon. rayon has not updated.
    # VantaDB does not use crossbeam directly. Plan: upgrade rayon when fix ships.
    "RUSTSEC-2023-0089",
    # RUSTSEC-2024-0436: rustls: `ManualIssueTime` policy enables client to lie about
    # certificate expiration. VantaDB uses default time verifier, not ManualIssueTime.
    # Only relevant if opt-in to the insecure policy. No action needed.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2025-0134: 1Password `schemars` related; only used in test/dev builds,
    # not in production server. Will upgrade when patch is available.
    "RUSTSEC-2025-0134",
]

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause",
         "BSD-3-Clause", "ISC", "Zlib", "Unicode-3.0", "CC0-1.0",
         "BSL-1.0", "0BSD", "CDLA-Permissive-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
