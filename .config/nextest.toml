[profile.audit]
default-filter = "not test(hnsw_hard_validation_certification) and not test(recall_certification_runner) and not test(stress_protocol_certification) and not test(validate_sift_dataset_integrity) and not test(sift1m_competitive_benchmark) and not test(test_benchmark_internal_10k) and not test(vector_scale_performance_certification)"
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }

[profile.audit.junit]
path = "junit.xml"
report-name = "vantadb-audit"
store-success-output = false
store-failure-output = true

[profile.experimental]
default-filter = "test(integration) or test(parser) or test(executor) or test(governor) or test(columnar) or test(mcp_integration) or test(structured_api_v2) or test(graph)"
features = ["experimental"]
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }
