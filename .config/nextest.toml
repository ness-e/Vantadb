[profile.audit]
default-filter = "not binary(hnsw_recall_certification) and not binary(stress_protocol) and not binary(hnsw_validation) and not binary(sift_validation) and not binary(competitive_bench) and not binary(benchmark_internal)"
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }

[profile.audit.junit]
path = "junit.xml"
report-name = "vantadb-audit"
store-success-output = false
store-failure-output = true

[profile.experimental]
default-filter = "binary(vantadb::integration) or binary(vantadb::parser) or binary(vantadb::executor) or binary(vantadb::governor) or binary(vantadb::columnar) or binary(vantadb-server::mcp_integration) or binary(vantadb::structured_api_v2) or binary(vantadb::graph)"
features = ["experimental"]
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }
