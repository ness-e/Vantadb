[profile.audit]
# Only quick integrity tests run in CI. Heavy tests (storage, WAL, text index, certification)
# are excluded here and run exclusively in heavy_certification.yml (weekly).
# Binary IDs match the test file stem (e.g. tests/storage/wal_resilience.rs → wal_resilience).
default-filter = """\
not binary(benchmark_internal) \
and not binary(benchmark_datasets) \
and not binary(cli_tests) \
and not binary(concurrency_parity) \
and not binary(derived_index_recovery) \
and not binary(durability_recovery) \
and not binary(edge_cases) \
and not binary(file_locking_stress) \
and not binary(fjall_cold_copy_restore) \
and not binary(fuzz_proptest) \
and not binary(index_reconstruction) \
and not binary(memory_api) \
and not binary(memory_brutality) \
and not binary(memory_export_import) \
and not binary(operational_metrics) \
and not binary(prefetch_benchmark) \
and not binary(property_durability) \
and not binary(schema_evolution) \
and not binary(text_index_recovery) \
and not binary(wal_resilience) \
and not binary(python_sdk_boundary) \
and not binary(structured_api_v2) \
and not binary(hnsw_recall_certification) \
and not binary(hnsw_validation) \
and not binary(hybrid_ranking_metrics) \
and not binary(hybrid_retrieval_quality) \
and not binary(sift_validation) \
and not binary(stress_protocol) \
and not binary(competitive_bench) \
and not binary(hardware_profiles) \
and not binary(basic_node) \
and not binary(vector_scale_check) \
and not binary(integration) \
and not binary(mcp_integration) \
and not binary(e2e) \
and not binary(benchmarks) \
and not binary(server) \
and not binary(antilocality_layout) \
and not binary(backend_tests) \
and not binary(chaos_integrity) \
and not binary(crash_injection) \
and not binary(gc) \
and not binary(mmap_index) \
and not binary(multi_process_lock) \
and not binary(mutations) \
and not binary(storage) \
and not binary(tombstone_ann_vstore) \
and not binary(mcp_tests) \
and not binary(multilingual_tokenizer_integration) \
and not binary(memory_telemetry) \
and not test(concurrent_insert_preserves_hnsw_invariants) \
"""
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }
test-threads = 2

[profile.audit.junit]
path = "junit.xml"
report-name = "vantadb-audit"
store-success-output = false
store-failure-output = true

[profile.experimental]
default-filter = "test(integration) or test(parser) or test(executor) or test(governor) or test(columnar) or test(mcp_integration) or test(structured_api_v2) or test(graph)"
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }

[profile.chaos]
default-filter = "test(chaos_integrity_failpoints)"
fail-fast = false
failure-output = "immediate-final"
test-threads = 1
slow-timeout = { period = "30s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }

