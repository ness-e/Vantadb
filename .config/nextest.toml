[profile.audit]
# Only quick integrity tests run in CI. Heavy tests (storage, WAL, text index, certification)
# are excluded here and run exclusively in heavy_certification.yml (weekly).
# Binary IDs match the test file stem (e.g. tests/storage/wal_resilience.rs → wal_resilience).
default-filter = "not test(/certification|benchmark|stress|heavy_recovery|validation|multi_process_lock|crash_injection|concurrent_insert_preserves_hnsw_invariants|antilocality_layout|mutations|backend_tests|gc|chaos_integrity|tombstone|storage|wal_resilience|cli_tests|derived_index|memory_brutality|schema_evolution|index_reconstruction|fuzz_proptest|file_locking|fjall_cold_copy|python|e2e|server|memory_export_import|operational_metrics|property_durability/)"
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
# Limit parallelism: Windows MSVC can hit STATUS_STACK_BUFFER_OVERRUN when linking many test binaries at once.
test-threads = 2
slow-timeout = { period = "60s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }

[profile.audit.junit]
path = "junit.xml"
report-name = "vantadb-audit"
store-success-output = false
store-failure-output = true

[profile.experimental]
default-filter = "test(integration) or test(parser) or test(executor) or test(governor) or test(columnar) or test(mcp_integration) or test(structured_api_v2) or test(graph)"
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }

[profile.chaos]
default-filter = "test(chaos_integrity_failpoints)"
fail-fast = false
failure-output = "immediate-final"
test-threads = 1
slow-timeout = { period = "30s", terminate-after = 3 }
leak-timeout = { period = "500ms", result = "fail" }

